name = "docracy-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Daily reminder sweep. Cron syntax is UTC.
[triggers]
crons = ["0 8 * * *"]

[[kv_namespaces]]
binding = "DOCRACY_KV"
id = "981eb8f0eace4d29bedb6b664a546c74"
preview_id = "704f39e4556644cf91ca4f49b551fab1"

[[r2_buckets]]
binding = "DOCRACY_DOCS"
bucket_name = "docracy-docs"

# Create with: wrangler d1 create docracy-index, then run migrations:
# wrangler d1 migrations apply docracy-index --remote (and --local for dev)
[[d1_databases]]
binding = "DOCRACY_DB"
database_name = "docracy-index"
database_id = "498b3b25-111e-435e-baca-5fb4af9c0e38"

# --- Non-secret config ---
# This is the deployed (production) value. Local `wrangler dev` overrides it back to localhost
# via apps/worker/.dev.vars, which takes precedence over [vars] when running locally.
[vars]
PUBLIC_APP_URL = "https://docracy.io"
PUBLIC_CONNECTOR_URL = "https://mcp.docracy.io"
PUBLIC_WORKER_URL = "https://api.docracy.io"
FREE_TIER_MAX_SIGNERS = "2"
DOC_TTL_DAYS = "9"
FEEDBACK_EMAIL = "founder@docracy.io"

# --- Secrets (never stored in this file) ---
# Set with: wrangler secret put TOKEN_SECRET
# Set with: wrangler secret put RESEND_API_KEY   (optional locally — omit to log emails to console instead of sending)
#
# --- Billing (Stripe) — all optional; billing routes 501 gracefully until these are set ---
# Set with: wrangler secret put STRIPE_SECRET_KEY
# Set with: wrangler secret put STRIPE_WEBHOOK_SECRET   (from the Stripe Dashboard's webhook config)
# STRIPE_PRICE_ID is not secret (just an identifier) — once a Price exists in the Stripe
# Dashboard, add it to [vars] above as STRIPE_PRICE_ID = "price_xxxxx".

# --- Staging: isolated KV/D1/R2 so testing never touches production data ---
# Deploy with: wrangler deploy --env staging
# Secrets: wrangler secret put TOKEN_SECRET --env staging (RESEND_API_KEY intentionally left
# unset here — emails just log to the console instead of actually sending during testing)
[env.staging]
name = "docracy-worker-staging"

[env.staging.triggers]
crons = ["0 8 * * *"]

[[env.staging.kv_namespaces]]
binding = "DOCRACY_KV"
id = "d2478fb8d7624291b832b5a8249dfa3c"

[[env.staging.r2_buckets]]
binding = "DOCRACY_DOCS"
bucket_name = "docracy-docs-staging"

[[env.staging.d1_databases]]
binding = "DOCRACY_DB"
database_name = "docracy-index-staging"
database_id = "2e0a9181-6bd6-4e79-9646-cdca7d1d8aba"

[env.staging.vars]
# The worker itself has no frontend routes — this must point to wherever the web app that
# renders /sign/:token actually lives. No staging Pages site exists yet, so this points at the
# local web dev server for now (matches how .dev.vars overrides this for local `wrangler dev`).
# Update this (and redeploy) once/if a staging Pages deployment exists.
PUBLIC_APP_URL = "http://localhost:5173"
PUBLIC_CONNECTOR_URL = "https://docracy-connector-staging.rl-d77.workers.dev"
PUBLIC_WORKER_URL = "https://docracy-worker-staging.rl-d77.workers.dev"
FREE_TIER_MAX_SIGNERS = "2"
DOC_TTL_DAYS = "9"
FEEDBACK_EMAIL = "founder@docracy.io"
